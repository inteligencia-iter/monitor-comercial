name: Atualizar Monitor de Eventos

# Roda toda segunda-feira e permite disparo manual pela aba Actions.
# Os eventos do Visit Rio mudam pouco ao longo da semana, então a cadência
# semanal é suficiente e econômica.
#
# Modo incremental: o events.json commitado é o BANCO acumulado. A Etapa A
# mescla o feed novo nele por `id`, preservando contatos já coletados; a
# Etapa C só enriquece eventos pendentes (novos ou com erro). Na 1ª segunda
# de cada mês fazemos um refresh completo (--todos) para reprocessar
# sem_contato/bloqueado.
on:
  schedule:
    # Toda segunda-feira, 09:00 UTC = 06:00 de Brasília (BRT, UTC-3)
    - cron: "0 9 * * 1"
  workflow_dispatch:        # botão "Run workflow" na interface do GitHub

# Permissão para o workflow fazer commit do events.json atualizado
permissions:
  contents: write

jobs:
  coletar-e-publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 45     # margem confortável (incremental é bem mais rápido)

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        # o checkout traz o events.json commitado = banco de partida do merge

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Etapa A+B — coletar e mesclar no banco (merge por id)
        run: python scraper_visitrio.py

      - name: Etapa B2 — coletar LOCAL (venue) da página do evento
        run: |
          # A API do Visit Rio não devolve o venue; ele está na página HTML de
          # cada evento. A B2 só visita páginas de eventos SEM local ainda
          # coletado (incremental), então no dia a dia só processa os novos.
          # O merge do scraper preserva local/local_coletado dos já coletados.
          BANCO_FILE=events_ab.json python etapa_b2_local.py

      - name: Etapa C — enriquecer contatos
        run: |
          # 1ª segunda-feira do mês (dia <= 7) = refresh COMPLETO (--todos),
          # para reprocessar sem_contato/bloqueado; demais semanas = só pendentes.
          if [ "$(date -u +%-d)" -le 7 ]; then
            echo "1ª segunda do mês: refresh COMPLETO (--todos)"
            python etapa_c_enriquecimento.py --todos
          else
            echo "Semana comum: só pendentes (incremental)"
            python etapa_c_enriquecimento.py
          fi

      - name: Etapa D — inteligência comercial (custo zero)
        run: python etapa_d_inteligencia.py

      - name: Preparar events.json para o site
        run: |
          # Encadeamento dos arquivos:
          #   scraper_visitrio.py       -> events_ab.json          (merge)
          #   etapa_c_enriquecimento.py -> events_enriquecido.json
          #   etapa_d_inteligencia.py   -> events_inteligencia.json (arquivo final)
          # O frontend consome events.json, então copiamos o final para lá.
          # Como o merge já incorporou o events.json antigo, sobrescrever é seguro.
          cp events_inteligencia.json events.json
          echo "Eventos no arquivo final:"
          python -c "import json; d=json.load(open('events.json')); print('total:', d['total'], '| novos:', sum(1 for e in d['eventos'] if e.get('novo')))"

      - name: Commit e push do events.json atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          # só faz commit se houver mudança de fato
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos eventos hoje."
          else
            git commit -m "Atualiza events.json — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
