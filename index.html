<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="build" content="202607092240">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monitor de Eventos - Visit Rio</title>
<link rel="icon" href="https://iter.com.br/favicon.ico" sizes="48x48">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f2150; --ink-soft:#3a495b; --ink-faint:#787878;
    --sea:#3cbab6; --sea-deep:#2c7a78; --sea-tint:#eaf7f7;
    --surface:#f4f9f9; --card:#FFFFFF; --line:#d8e8e8; --line-soft:#eaf3f3;
    --coral:#eb4a74; --amber:#4c4f9e; --teal:#35a4a0; --go:#1e6eb7;
    --slate:#a0dbd7;
    --shadow:0 1px 2px rgba(31,33,80,.05), 0 2px 8px rgba(31,33,80,.07);
    --shadow-lg:0 8px 30px rgba(44,122,120,.18);
    --r:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Barlow",system-ui,sans-serif;background:var(--surface);color:var(--ink);
    line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px;
  }
  a{color:var(--sea);text-decoration:none}
  a:hover{text-decoration:underline}
  .mono{font-family:"IBM Plex Mono",monospace}
  .num{font-family:"Barlow",sans-serif;font-variant-numeric:tabular-nums}

  /* ---------- header ---------- */
  header{background:#1f2150;color:#fff;padding:22px 0 20px}
  .wrap{max-width:1240px;margin:0 auto;padding:0 22px}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{font-family:"Barlow";font-size:21px;font-weight:700;letter-spacing:-.01em}
  .brand .tag{font-size:12.5px;color:#BEE0E3;font-weight:500}
  .updated{font-size:11.5px;color:#9FC9CD;margin-top:5px}

  /* ---------- KPIs ---------- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
  .kpi{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:var(--r);padding:13px 15px;backdrop-filter:blur(4px)}
  .kpi .v{font-family:"Barlow";font-size:27px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .kpi .l{font-size:11px;color:#C6E3E6;margin-top:5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .kpi.hot .v{color:#FFD9CE}
  .kpi.click{cursor:pointer;transition:box-shadow .15s}
  .kpi.click:hover{box-shadow:0 0 0 2px rgba(255,255,255,.35)}
  .past-bar{opacity:.35}
  .ev-past td{opacity:.5}
  .badge-enc{background:#93A7AD;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:5px}
  .agrow.past{opacity:.45}
  .toggle-past{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;user-select:none}
  .toggle-past input{display:none}
  .toggle-past .sw{width:32px;height:18px;border-radius:10px;background:#D3DEDE;position:relative;transition:background .15s}
  .toggle-past .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle-past input:checked + .sw{background:var(--sea)}
  .toggle-past input:checked + .sw::after{transform:translateX(14px)}

  /* ---------- toolbar ---------- */
  .toolbar{max-width:1240px;margin:18px auto 0;padding:0 22px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search{position:relative;flex:1;min-width:200px}
  .search input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:13.5px;font-family:inherit;color:var(--ink)}
  .search input:focus{outline:2px solid var(--teal);outline-offset:-1px;border-color:transparent}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}
  .selct{position:relative}
  select,.mini{font-family:inherit;font-size:13px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer}
  select:focus{outline:2px solid var(--teal);outline-offset:-1px}
  .segbtns{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .segbtns button{border:none;background:none;padding:9px 13px;cursor:pointer;font:inherit;font-size:13px;font-weight:600;color:var(--ink-soft)}
  .segbtns button.on{background:var(--sea);color:#fff}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;user-select:none}
  .toggle input{display:none}
  .toggle .sw{width:32px;height:18px;border-radius:10px;background:#D3DEDE;position:relative;transition:background .15s}
  .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle input:checked + .sw{background:var(--go)}
  .toggle input:checked + .sw::after{transform:translateX(14px)}
  .grow{flex:1}
  .btn{font-family:inherit;font-size:13px;font-weight:600;border-radius:10px;padding:9px 15px;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:7px}
  .btn-primary{background:var(--coral);color:#fff}
  .btn-primary:hover{background:#d84e30}
  .btn-ghost{background:var(--card);border-color:var(--line);color:var(--ink-soft)}
  .btn-ghost:hover{border-color:var(--teal);color:var(--sea)}
  .btn-ghost.on{background:var(--sea);color:#fff;border-color:var(--sea)}

  main{max-width:1240px;margin:16px auto 70px;padding:0 22px}
  .result-line{font-size:12.5px;color:var(--ink-soft);margin:14px 2px 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .result-line b{color:var(--ink);font-weight:600}
  .clearlink{color:var(--sea);cursor:pointer;font-weight:600}

  /* ---------- leads table ---------- */
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:700;text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);background:#FAFCFC;white-space:nowrap;user-select:none}
  thead th.sortable{cursor:pointer}
  thead th.sortable:hover{color:var(--sea)}
  th .arr{opacity:.4;font-size:9px}
  th.on .arr{opacity:1;color:var(--coral)}
  tbody tr{border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .12s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#F7FBFB}
  tbody tr.sel{background:var(--sea-tint)}
  td{padding:11px 14px;vertical-align:middle}
  .col-chk{width:38px;text-align:center}
  .col-chk input{width:15px;height:15px;accent-color:var(--sea);cursor:pointer}
  .ev-title{font-weight:600;color:var(--ink);font-size:13.5px;line-height:1.35;max-width:340px}
  .ev-sub{font-size:11.5px;color:var(--ink-faint);margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge-new{background:var(--go);color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:5px}
  .seg{font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .seg .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .when{font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .when .d{font-family:"Barlow";font-weight:600;color:var(--ink)}
  .porte{font-size:11px;font-weight:600;text-transform:capitalize;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .porte.grande{background:#FBE8DF;color:#B4491F}
  .porte.médio,.porte.medio{background:#E6F0F1;color:#0E5866}
  .porte.pequeno{background:#EEF2F2;color:#5C7178}

  /* score meter */
  .score{display:flex;align-items:center;gap:9px;min-width:96px}
  .score .n{font-family:"Barlow";font-weight:700;font-size:16px;width:26px;text-align:right;font-variant-numeric:tabular-nums}
  .meter{flex:1;height:6px;background:#EDF2F2;border-radius:4px;overflow:hidden}
  .meter i{display:block;height:100%;border-radius:4px}

  /* contact cell */
  .contact-cell{display:flex;flex-direction:column;gap:3px;min-width:150px}
  .copychip{display:inline-flex;align-items:center;gap:6px;background:#F4F8F8;border:1px solid var(--line);border-radius:7px;padding:3px 6px 3px 9px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--ink);max-width:230px;cursor:pointer;transition:border-color .12s,background .12s}
  .copychip:hover{border-color:var(--teal);background:#EFF6F6}
  .copychip .txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .copychip .ico{color:var(--ink-faint);flex-shrink:0}
  .copychip.copied{border-color:var(--go);background:#E7F6EF;color:var(--go)}
  .copychip.copied .ico{color:var(--go)}
  .no-contact{font-size:11.5px;color:var(--ink-faint)}
  .no-contact .prod{color:var(--ink-soft);font-weight:600}

  /* ---------- agenda view ---------- */
  .month{margin-bottom:26px}
  .month h3{font-family:"Barlow";font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sea);padding-bottom:8px;border-bottom:2px solid var(--line);margin-bottom:12px}
  .agrow{display:grid;grid-template-columns:60px 1fr auto;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--slate);border-radius:10px;padding:12px 15px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow)}
  .agrow:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
  .agrow{transition:box-shadow .15s,transform .12s}
  .agrow .date{text-align:center}
  .agrow .date .dd{font-family:"Barlow";font-size:22px;font-weight:700;line-height:1;color:var(--ink)}
  .agrow .date .mm{font-size:10px;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
  .agrow .date .rg{font-size:9px;color:var(--ink-faint);margin-top:2px}

  /* ---------- nav tabs + calendário + insights ---------- */
  .nav{max-width:1240px;margin:16px auto 0;padding:0 22px;display:flex;gap:4px;border-bottom:1px solid var(--line)}
  .nav button{border:none;background:none;font:inherit;font-size:14px;font-weight:600;color:var(--ink-soft);padding:11px 18px;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px}
  .nav button:hover{color:var(--sea)}
  .nav button.on{color:var(--sea);border-bottom-color:var(--coral)}
  .calbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:16px 0 4px}
  .monthnav{display:flex;align-items:center;gap:6px}
  .monthnav button{width:32px;height:32px;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;font-size:15px;color:var(--sea);display:flex;align-items:center;justify-content:center}
  .monthnav button:hover{border-color:var(--teal);background:var(--sea-tint)}
  .monthnav .mlabel{font-family:"Barlow";font-size:18px;font-weight:700;color:var(--ink);text-transform:capitalize;min-width:158px;text-align:center}
  .today-btn{font-size:12.5px;font-weight:600;color:var(--sea);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer}
  .today-btn:hover{border-color:var(--teal)}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-left:auto}
  .legend .lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;user-select:none;transition:opacity .12s}
  .legend .lg.off{opacity:.32}
  .legend .lg .sq{width:11px;height:11px;border-radius:3px}

  .calwrap{display:grid;grid-template-columns:1fr 322px;gap:20px;align-items:start}
  .calendar{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:#FAFCFC;border-bottom:1px solid var(--line)}
  .cal-dow div{padding:9px 10px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);text-align:left}
  .week{display:grid;grid-template-columns:repeat(7,1fr);position:relative;border-bottom:1px solid var(--line-soft)}
  .week:last-child{border-bottom:none}
  .daycell{min-height:114px;border-right:1px solid var(--line-soft);padding:6px 6px 4px}
  .daycell:last-child{border-right:none}
  .daycell.out{background:#FBFCFC}
  .daynum{font-family:"Barlow";font-size:12.5px;font-weight:600;color:var(--ink-soft);width:23px;height:23px;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .daycell.out .daynum{color:#C2CFCF}
  .daynum.today{background:var(--coral);color:#fff}
  .bars{position:absolute;left:0;right:0;pointer-events:none}
  .bar{position:absolute;height:19px;border-radius:5px;font-size:10.5px;font-weight:600;color:#fff;padding:0 7px;line-height:19px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:auto;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .bar:hover{filter:brightness(1.08);text-decoration:none}
  .bar.cont-l{border-top-left-radius:0;border-bottom-left-radius:0}
  .bar.cont-r{border-top-right-radius:0;border-bottom-right-radius:0}
  .more{position:absolute;font-size:10px;font-weight:700;color:var(--ink-soft);cursor:pointer;padding:0 6px;pointer-events:auto}
  .more:hover{color:var(--coral)}

  .insights{display:flex;flex-direction:column;gap:14px}
  .icard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 17px}
  .icard h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--coral);font-weight:700;margin-bottom:12px}
  .icard .mtot{font-family:"Barlow";font-size:30px;font-weight:700;line-height:1;color:var(--ink)}
  .icard .mtot span{font-size:13px;color:var(--ink-soft);font-weight:500;margin-left:6px}
  .catrow{display:flex;align-items:center;gap:9px;margin-top:11px}
  .catrow .sq{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .catrow .cname{font-size:12.5px;color:var(--ink);min-width:82px;text-transform:capitalize}
  .catrow .cbar{height:6px;border-radius:3px;background:var(--line);flex:1;overflow:hidden}
  .catrow .cbar i{display:block;height:100%;border-radius:3px}
  .catrow .cn{font-family:"Barlow";font-weight:700;font-size:13px;width:24px;text-align:right;font-variant-numeric:tabular-nums}
  .venue{display:flex;align-items:center;gap:9px;font-size:13px;margin-bottom:9px}
  .venue .vn{flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .venue .vc{font-family:"Barlow";font-weight:700;color:var(--sea);font-variant-numeric:tabular-nums}
  .venue.faint .vn{color:var(--ink-faint)}
  .ihint{font-size:11.5px;color:var(--ink-faint);margin-top:6px;line-height:1.5}
  .toplead{display:flex;align-items:center;gap:12px;cursor:pointer;padding:2px 0}
  .toplead .ts{font-family:"Barlow";font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
  .toplead .tt{font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.3}
  .toplead:hover .tt{color:var(--sea)}

  .pop{position:fixed;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);z-index:55;width:272px;max-height:340px;overflow-y:auto;padding:12px}
  .pop h5{font-family:"Barlow";font-size:13px;font-weight:700;margin-bottom:9px;color:var(--ink);text-transform:capitalize}
  .pop .pev{display:flex;gap:8px;align-items:center;padding:6px 7px;border-radius:8px;cursor:pointer;font-size:12.5px}
  .pop .pev:hover{background:var(--surface)}
  .pop .pev .pd{width:9px;height:9px;border-radius:3px;flex-shrink:0}

  @media (max-width:980px){ .calwrap{grid-template-columns:1fr} }

  /* ---------- drawer ---------- */
  .overlay{position:fixed;inset:0;background:rgba(10,36,43,.42);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:460px;max-width:100%;background:var(--card);z-index:61;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.1,1);overflow-y:auto;box-shadow:var(--shadow-lg)}
  .drawer.open{transform:none}
  .dhead{background:#1f2150;color:#fff;padding:22px 24px 20px;position:sticky;top:0}
  .dhead .close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.16);border:none;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px}
  .dhead .cat{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#A9D4D8;font-weight:600}
  .dhead h2{font-family:"Barlow";font-size:19px;font-weight:700;margin-top:6px;line-height:1.28}
  .dbody{padding:20px 24px 40px}
  .dscore{display:flex;align-items:center;gap:16px;background:var(--surface);border-radius:12px;padding:14px 18px;margin-bottom:20px}
  .dscore .big{font-family:"Barlow";font-size:36px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .dscore .meta{font-size:12px;color:var(--ink-soft)}
  .dscore .meta b{color:var(--ink);display:block;font-size:13px;margin-bottom:2px;text-transform:capitalize}
  .sec{margin-bottom:20px}
  .sec h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--coral);font-weight:700;margin-bottom:9px}
  .row2{display:flex;gap:10px;font-size:13.5px;margin-bottom:7px}
  .row2 .k{color:var(--ink-soft);min-width:90px;font-weight:600}
  .row2 .v{color:var(--ink);flex:1}
  .angle{font-size:13.5px;color:var(--ink-soft);line-height:1.6;background:#FCF3EF;border-left:3px solid var(--coral);padding:11px 14px;border-radius:0 8px 8px 0}
  .contactlist{display:flex;flex-direction:column;gap:7px}
  .contactlist .copychip{max-width:100%;font-size:12.5px;padding:7px 9px 7px 12px}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{background:var(--sea-tint);color:var(--sea);font-size:11.5px;padding:3px 10px;border-radius:6px;font-weight:500}
  .dlink{display:inline-flex;align-items:center;gap:7px;background:var(--sea);color:#fff;padding:9px 16px;border-radius:9px;font-weight:600;font-size:13px;margin-top:4px}
  .dlink:hover{background:var(--sea-deep);text-decoration:none}
  .desc{font-size:12.5px;color:var(--ink-soft);line-height:1.6}
  .locked{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--go);font-weight:600;margin-top:8px}

  /* ---------- toast ---------- */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80;box-shadow:var(--shadow-lg)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .ck{color:#6FE3AE;margin-right:6px}

  .empty{text-align:center;padding:70px 20px;color:var(--ink-soft)}
  .empty .big{font-family:"Barlow";font-size:17px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .loading{text-align:center;padding:80px 20px;color:var(--ink-soft)}

  /* mobile: table becomes cards */
  @media (max-width:860px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    thead{display:none}
    table,tbody,tr,td{display:block;width:100%}
    tbody tr{padding:12px 14px;position:relative}
    td{padding:4px 0;border:none}
    .col-chk{position:absolute;top:12px;right:10px;width:auto}
    .score{margin-bottom:6px}
    .ev-title{max-width:none}
    .contact-cell{min-width:0;margin-top:6px}
    .drawer{width:100%}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <h1>Monitor de Eventos - Visit Rio</h1>
    </div>
    <div class="updated" id="updated">Carregando…</div>
    <div class="kpis" id="kpis"></div>

  for(const [nome,kws] of VENUES){ if(kws.some(k=>t.includes(k))) return nome; }
  return null;
}

// ---------- carregar dados (fetch ao vivo; fallback = dados embutidos) ----------
async function carregar(){
  let data=null;
  try{
    const r=await fetch("events.json?"+Date.now());
    if(r.ok) data=await r.json();
  }catch(e){/* preview sem servidor: usa embutido */}
  if(!data){
    try{ data=JSON.parse(document.getElementById("seed").textContent); }catch(e){}
  }
  if(!data||!data.eventos){
    document.getElementById("main").innerHTML='<div class="empty"><div class="big">Não foi possível carregar os eventos.</div>Verifique se o arquivo events.json está na mesma pasta.</div>';
    return;
  }
  state.all=data.eventos.map(e=>({
    ...e,
    _ini:new Date((e.data_inicio||"").replace(" ","T")),
    _fim:new Date((e.data_fim||e.data_inicio||"").replace(" ","T")),
  })).filter(e=>!isNaN(e._ini) && !e.no_feed);
  state.leads=state.all.filter(e=>e.categoria==="corporativos");

  const dt=data.gerado_em?new Date(data.gerado_em).toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short",timeZone:"America/Sao_Paulo"}):"—";
  document.getElementById("updated").textContent="Atualizado em "+dt+" · "+state.leads.length+" leads corporativos";
  // mês inicial do calendário = primeiro mês com eventos
  const ord=[...state.all].sort((a,b)=>a._ini-b._ini);
  const first=ord.length?ord[0]._ini:new Date();
  state.cal={y:first.getFullYear(), m:first.getMonth()};
  montarSegmentos();
  document.getElementById("nav").hidden=false;
  bind();
  render();
}

function temContato(e){const c=e.contato||{};return (c.emails&&c.emails.length)||(c.telefones&&c.telefones.length)||(c.whatsapp&&c.whatsapp.length)}
function score(e){return e.inteligencia?.relevancia_b2b ?? 0}
// "novo" = adicionado na última execução do pipeline (flag do scraper).
// Enquanto o histórico de primeiro_visto amadurece, a flag é o sinal mais honesto.
function ehNovo(e){return e.novo===true}
function scoreColor(s){return s>=90?"var(--coral)":s>=80?"var(--amber)":s>=65?"var(--teal)":s>=50?"#4E8A93":"var(--slate)"}

function montarSegmentos(){
  // agrupa por ÁREA (ex.: todos "Saúde / *" viram uma única opção "Saúde")
  const areas=[...new Set(state.leads.map(e=>areaOf(e.inteligencia?.segmento)).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt"));
  const sel=document.getElementById("fSeg");
  areas.forEach(a=>{const o=document.createElement("option");o.value=a;o.textContent=a;sel.appendChild(o)});
}

// ---------- filtro + ordenação ----------
function filtrados(){
  const q=state.q.toLowerCase();
  let r=state.leads.filter(e=>{
    if(!state.showPast && encerrado(e)) return false;
    if(state.soNovo && !ehNovo(e)) return false;
    if(state.seg && areaOf(e.inteligencia?.segmento)!==state.seg) return false;
    if(state.porte && e.inteligencia?.porte_estimado!==state.porte) return false;
    if(score(e)<state.minScore) return false;
    if(state.soContato && !temContato(e)) return false;
    if(q){
      const hay=(e.titulo+" "+(e.inteligencia?.segmento||"")+" "+(e.local||"")+" "+((e.contato?.produtoras_inferidas||[]).join(" "))).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const {key,dir}=state.sort;
  r.sort((a,b)=>{
    let va,vb;
    if(key==="score"){va=score(a);vb=score(b)}
    else if(key==="date"){va=a._ini;vb=b._ini}
    else if(key==="title"){va=a.titulo.toLowerCase();vb=b.titulo.toLowerCase()}
    else if(key==="seg"){va=a.inteligencia?.segmento||"";vb=b.inteligencia?.segmento||""}
    if(va<vb)return -1*dir; if(va>vb)return 1*dir;
    return a._ini-b._ini;
  });
  return r;
}

// ---------- KPIs ----------
function renderKpis(){
  const L=state.leads;
  const com=L.filter(temContato).length;
  const alta=L.filter(e=>score(e)>=80).length;
  const novos=L.filter(ehNovo).length;
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div class="v num">${L.length}</div><div class="l">Leads corporativos</div></div>
    <div class="kpi"><div class="v num" style="color:#9FE9C6">${com}</div><div class="l">Com contato</div></div>
    <div class="kpi hot"><div class="v num">${alta}</div><div class="l">Alta relevância (≥80)</div></div>
    <div class="kpi click" id="kpiNovos" title="Ver novos leads"><div class="v num">${novos}</div><div class="l">Novos leads — clique para ver</div></div>`;
  const kn=document.getElementById("kpiNovos");
  if(kn) kn.onclick=()=>{state.view="leads";state.soNovo=true;syncControls();render();};
}

// ---------- render principal ----------
function render(){
  renderKpis();
  // nav ativa
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("on",b.dataset.v===state.view));
  // controles por view
  document.getElementById("toolbar").hidden = (state.view==="calendario");
  document.querySelectorAll(".leads-only").forEach(el=>el.style.display = state.view==="leads"?"":"none");
  const tp=document.getElementById("togglePast");
  if(tp) tp.style.display=(state.view==="leads"||state.view==="agenda")?"":"none";

  const main=document.getElementById("main");
  if(state.view==="calendario"){ renderCalendar(main); return; }
  if(state.view==="agenda"){ renderAgenda(main); return; }
  renderLeads(main);
}

function renderLeads(main){
  const rows=filtrados();
  const total=state.leads.length;
  const selN=state.sel.size;
  let head=`<div class="result-line"><b>${rows.length}</b> de ${total} leads`;
  if(rows.length<total) head+=` · <span class="clearlink" id="clearF">limpar filtros</span>`;
  if(selN) head+=` · <b>${selN}</b> selecionado${selN>1?"s":""} para exportar`;
  head+=`</div>`;

  if(!rows.length){ main.innerHTML=head+`<div class="empty"><div class="big">Nenhum lead com esses filtros.</div>Ajuste a busca ou limpe os filtros para ver todos.</div>`; wireClear(); return; }

  const sc=(k,label,cls="")=>{const on=state.sort.key===k;const ar=on?(state.sort.dir<0?"▼":"▲"):"";return `<th class="sortable ${cls} ${on?"on":""}" data-sort="${k}">${label} <span class="arr">${ar||"▼"}</span></th>`};
  const allSel=rows.every(e=>state.sel.has(e.id)) && rows.length>0;

  let html=head+`<div class="tablecard"><table><thead><tr>
    <th class="col-chk"><input type="checkbox" id="selAll" ${allSel?"checked":""} title="Selecionar tudo"></th>
    ${sc("score","Score")}
    ${sc("title","Evento")}
    ${sc("seg","Segmento")}
    ${sc("date","Quando")}
    <th>Contato</th>
    <th>Porte</th>
  </tr></thead><tbody>`;
  rows.forEach(e=>html+=rowHTML(e));
  html+=`</tbody></table></div>`;
  main.innerHTML=html;
  wireTable(rows);
}

function rowHTML(e){
  const s=score(e), col=scoreColor(s), seg=e.inteligencia?.segmento||"—";
  const porte=e.inteligencia?.porte_estimado||"—";
  const sel=state.sel.has(e.id)?"sel":"";
  const past=encerrado(e);
  const multi=e._ini.toDateString()!==e._fim.toDateString();
  const rg=multi?`<div class="rg">até ${e._fim.getDate()}/${e._fim.getMonth()+1}</div>`:"";
  return `<tr class="${sel}${past?" ev-past":""}" data-id="${e.id}">
    <td class="col-chk"><input type="checkbox" class="rowchk" data-id="${e.id}" ${sel?"checked":""}></td>
    <td><div class="score"><span class="n" style="color:${col}">${s}</span><span class="meter"><i style="width:${s}%;background:${col}"></i></span></div></td>
    <td><div class="ev-title">${esc(e.titulo)}</div><div class="ev-sub">${ehNovo(e)?'<span class="badge-new">novo</span>':""}${encerrado(e)?'<span class="badge-enc">encerrado</span>':""}<span>${esc(e.local||"Local a confirmar")}</span></div></td>
    <td><span class="seg"><span class="dot" style="background:${col}"></span>${esc(seg)}</span></td>
    <td><span class="when"><span class="d">${e._ini.getDate()} ${MES_ABREV[e._ini.getMonth()]}</span></span></td>
    <td>${contactCellHTML(e)}</td>
    <td><span class="porte ${porte}">${esc(porte)}</span></td>
  </tr>`;
}

function contactCellHTML(e){
  const c=e.contato||{}; let out=`<div class="contact-cell">`;
  const mk=(val,label)=>`<span class="copychip" data-copy="${escAttr(val)}" title="Copiar ${label}"><span class="txt">${esc(val)}</span><span class="ico">${copyIco()}</span></span>`;
  if(c.emails&&c.emails.length) out+=mk(c.emails[0],"e-mail");
  if(c.telefones&&c.telefones.length) out+=mk(c.telefones[0],"telefone");
  if(!(c.emails&&c.emails.length)&&!(c.telefones&&c.telefones.length)){
    if(c.whatsapp&&c.whatsapp.length) out+=mk(c.whatsapp[0],"WhatsApp");
    else{const p=(c.produtoras_inferidas||[])[0];out+=`<span class="no-contact">${p?`via <span class="prod">${esc(p)}</span>`:"sem contato público"}</span>`}
  }
  return out+`</div>`;
}
function copyIco(){return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>'}

function wireTable(rows){
  document.querySelectorAll("th.sortable").forEach(function(th){
    th.addEventListener("click", function(){
      const k=this.dataset.sort;
      if(state.sort.key===k) state.sort.dir*=-1;
      else state.sort={key:k,dir:(k==="title"||k==="seg")?1:-1};
      render();
    });
  });
  const selAll=document.getElementById("selAll");
  if(selAll) selAll.onclick=(ev)=>{ev.stopPropagation();rows.forEach(e=>ev.target.checked?state.sel.add(e.id):state.sel.delete(e.id));render()};
  document.querySelectorAll(".rowchk").forEach(ch=>ch.onclick=(ev)=>{
    ev.stopPropagation();const id=+ch.dataset.id;ch.checked?state.sel.add(id):state.sel.delete(id);render();
  });
  document.querySelectorAll(".copychip").forEach(ch=>ch.onclick=(ev)=>{ev.stopPropagation();copiar(ch.dataset.copy,ch)});
  document.querySelectorAll("tbody tr").forEach(tr=>tr.onclick=()=>abrir(+tr.dataset.id));
  wireClear();
}
function wireClear(){const c=document.getElementById("clearF");if(c)c.onclick=()=>{state.q="";state.seg="";state.porte="";state.minScore=0;state.soContato=false;state.soNovo=false;syncControls();render()}}

// ---------- agenda ----------
function renderAgenda(main){
  const q=state.q.toLowerCase();

    if(!state.showPast && encerrado(e)) return false;

    if(state.seg && areaOf(e.inteligencia?.segmento)!==state.seg) return false;

  }).sort((a,b)=>a._ini-b._ini);

  const groups={};

        <div><div class="ev-title">${esc(e.titulo)}${ehNovo(e)?' <span class="badge-new">novo</span>':""}</div>
        <div class="ev-sub"><span>${esc(e.categoria)}</span>${e.inteligencia?.segmento?`· <span>${esc(e.inteligencia.segmento)}</span>`:""}</div></div>
        ${e.categoria==="corporativos"?`<div class="score"><span class="n" style="color:${col}">${s}</span></div>`:`<div></div>`}

// ---------- calendário (home) ----------
function monthEvents(y,m){
  const first=new Date(y,m,1), last=new Date(y,m+1,0,23,59);
  return state.all.filter(e=>{
    if(state.catOff.has(e.categoria)) return false;
    return e._ini<=last && e._fim>=first;   // sobrepõe o mês
  });
}
// áreas de segmento presentes num mês (base: corporativos que tocam o mês)
function monthAreas(y,m){
  const first=new Date(y,m,1), last=new Date(y,m+1,0,23,59);
  const s=new Set();
  state.all.forEach(e=>{
    if(e.categoria!=="corporativos") return;
    if(e._ini<=last && e._fim>=first){const a=areaOf(e.inteligencia?.segmento); if(a) s.add(a);}
  });
  return [...s].sort((a,b)=>a.localeCompare(b,"pt"));
}
function matchCalSeg(e){return !state.calSeg || areaOf(e.inteligencia?.segmento)===state.calSeg}

function renderCalendar(main){
  const {y,m}=state.cal;
  const mlabel=MES_NOME[m]+" de "+y;
  const areas=monthAreas(y,m);
  // se a área selecionada não existe no mês visível, volta para "todas"
  if(state.calSeg && !areas.includes(state.calSeg)) state.calSeg="";
  const opts=`<option value="">Todos os segmentos</option>`+areas.map(a=>`<option value="${escAttr(a)}" ${state.calSeg===a?"selected":""}>${esc(a)}</option>`).join("");
  const segSel=areas.length?`<select id="calSeg" title="Filtrar por segmento (apenas os presentes neste mês)">${opts}</select>`:"";
  const legend=Object.keys(CAT_COLOR).map(c=>`<span class="lg ${state.catOff.has(c)?"off":""}" data-cat="${c}"><span class="sq" style="background:${CAT_COLOR[c]}"></span>${CAT_LABEL[c]}</span>`).join("");
  let html=`<div class="calbar">
    <div class="monthnav">
      <button id="mPrev" aria-label="Mês anterior">‹</button>
      <span class="mlabel">${mlabel}</span>
      <button id="mNext" aria-label="Próximo mês">›</button>
    </div>
    <button class="today-btn" id="mToday">Hoje</button>
    ${segSel}
    <div class="legend">${legend}</div>
  </div>
  <div class="calwrap">
    <div class="calendar">
      <div class="cal-dow"><div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div></div>
      ${buildWeeks(y,m)}
    </div>
    <div class="insights">${buildInsights(y,m)}</div>
  </div>`;
  main.innerHTML=html;

}

function buildWeeks(y,m){
  const first=new Date(y,m,1);
  const startOffset=first.getDay();              // 0=Dom
  const gridStart=new Date(y,m,1-startOffset);
  const gridEnd=new Date(gridStart); gridEnd.setDate(gridStart.getDate()+41); gridEnd.setHours(23,59,59);
  const evs=state.all.filter(e=>{
    if(state.catOff.has(e.categoria)) return false;
    if(!matchCalSeg(e)) return false;
    return e._ini<=gridEnd && e._fim>=gridStart;   // sobrepõe a grade visível
  });
  const today=new Date(); today.setHours(0,0,0,0);
  const LANES=3, BARH=19, GAP=3, TOP=27;
  let out="";
  for(let w=0; w<6; w++){
    const weekStart=new Date(gridStart); weekStart.setDate(gridStart.getDate()+w*7);
    const weekEnd=new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6); weekEnd.setHours(23,59,59);
    if(weekStart>new Date(y,m+1,0) && w>0 && weekStart.getMonth()!==m) { /* semana totalmente fora à frente */ }
    // células
    let cells="";
    for(let d=0; d<7; d++){
      const day=new Date(weekStart); day.setDate(weekStart.getDate()+d);
      const out_=day.getMonth()!==m;
      const isToday=day.getTime()===today.getTime();
      cells+=`<div class="daycell ${out_?"out":""}" data-date="${day.toISOString().slice(0,10)}"><span class="daynum ${isToday?"today":""}">${day.getDate()}</span></div>`;
    }
    // eventos que tocam a semana
    const weekEvs=evs.filter(e=>e._ini<=weekEnd && e._fim>=weekStart)
      .sort((a,b)=> (a._ini-b._ini) || (b._fim-b._ini)-(a._fim-a._ini));
    const lanes=[]; const overflow={};
    let bars="";
    weekEvs.forEach(e=>{
      const startIdx=Math.max(0, Math.floor((stripTime(e._ini)-stripTime(weekStart))/864e5));
      const endIdx=Math.min(6, Math.floor((stripTime(e._fim)-stripTime(weekStart))/864e5));
      let lane=0; while(lanes[lane] && lanes[lane].some(r=>!(endIdx<r[0]||startIdx>r[1]))) lane++;
      if(lane>=LANES){ for(let c=startIdx;c<=endIdx;c++) overflow[c]=(overflow[c]||0)+1; return; }
      (lanes[lane]=lanes[lane]||[]).push([startIdx,endIdx]);
      const col=CAT_COLOR[e.categoria]||CAT_COLOR.outros;
      const left=startIdx/7*100, width=(endIdx-startIdx+1)/7*100;
      const contL=e._ini<weekStart?" cont-l":"", contR=e._fim>weekEnd?" cont-r":"";
      bars+=`<div class="bar${contL}${contR}${encerrado(e)?" past-bar":""}" data-id="${e.id}" style="left:calc(${left}% + 4px);width:calc(${width}% - 8px);top:${TOP+lane*(BARH+GAP)}px;background:${col}" title="${escAttr(e.titulo)}">${esc(e.titulo)}</div>`;
    });
    // "+N mais" por dia
    Object.keys(overflow).forEach(c=>{
      const left=(+c)/7*100;
      bars+=`<div class="more" data-date="${new Date(weekStart.getFullYear(),weekStart.getMonth(),weekStart.getDate()+ +c).toISOString().slice(0,10)}" style="left:calc(${left}% + 6px);top:${TOP+LANES*(BARH+GAP)}px">+${overflow[c]} mais</div>`;
    });
    const laneCount=Math.min(lanes.length,LANES)+(Object.keys(overflow).length?1:0);
    const minH=Math.max(114, TOP+Math.max(laneCount,1)*(BARH+GAP)+6);
    out+=`<div class="week" style="grid-auto-rows:${minH}px"><div class="bars" style="height:${minH}px">${bars}</div>${cells}</div>`;
    // parar se a próxima semana já passou totalmente do mês
    if(day_after(weekEnd,new Date(y,m+1,0)) ) break;
  }
  return out;
}
function stripTime(d){const x=new Date(d);x.setHours(0,0,0,0);return x.getTime()}
function day_after(a,b){return a.getTime()>b.getTime()}

function buildInsights(y,m){
  const evs=state.all.filter(e=>{const first=new Date(y,m,1),last=new Date(y,m+1,0,23,59);if(state.catOff.has(e.categoria))return false;if(!matchCalSeg(e))return false;return e._ini<=last&&e._fim>=first});
  const total=evs.length;
  if(!total) return `<div class="icard"><h4>${MES_NOME[m]} de ${y}</h4><div class="ihint">Nenhum evento neste mês.</div></div>`;
  // por categoria
  const byCat={}; evs.forEach(e=>byCat[e.categoria]=(byCat[e.categoria]||0)+1);
  const maxCat=Math.max(...Object.values(byCat));
  let cats="";
  ["corporativos","esportivos","culturais","outros"].forEach(c=>{ if(!byCat[c])return;
    cats+=`<div class="catrow"><span class="sq" style="background:${CAT_COLOR[c]}"></span><span class="cname">${CAT_LABEL[c]}</span><span class="cbar"><i style="width:${byCat[c]/maxCat*100}%;background:${CAT_COLOR[c]}"></i></span><span class="cn">${byCat[c]}</span></div>`;
  });
  // por local
  const byV={}; let semLocal=0;
  evs.forEach(e=>{const v=inferVenue(e); if(v) byV[v]=(byV[v]||0)+1; else semLocal++;});
  const vsorted=Object.entries(byV).sort((a,b)=>b[1]-a[1]).slice(0,6);
  let venues=vsorted.map(([n,c])=>`<div class="venue"><span class="vn">${esc(n)}</span><span class="vc">${c}</span></div>`).join("");
  if(semLocal) venues+=`<div class="venue faint"><span class="vn">Local a confirmar</span><span class="vc">${semLocal}</span></div>`;
  // top lead do mês
  const leads=evs.filter(e=>e.categoria==="corporativos").sort((a,b)=>score(b)-score(a));
  const top=leads[0];
  const topHtml=top?`<div class="icard"><h4>Lead destaque do mês</h4><div class="toplead" data-id="${top.id}"><div class="ts" style="color:${scoreColor(score(top))}">${score(top)}</div><div class="tt">${esc(top.titulo)}</div></div></div>`:"";

  return `
    <div class="icard"><h4>Resumo de ${MES_NOME[m]}</h4>
      <div class="mtot">${total}<span>evento${total>1?"s":""}</span></div>
      ${cats}
    </div>
    <div class="icard"><h4>Onde acontecem</h4>
      ${venues}
      ${semLocal?`<div class="ihint">O Visit Rio raramente publica o local na fonte; inferimos pelo texto do evento. A cobertura melhora conforme os sites são enriquecidos.</div>`:""}
    </div>
    ${topHtml}`;
}

function wireCalendar(){
  const go=(dm)=>{let{y,m}=state.cal;m+=dm;if(m<0){m=11;y--}if(m>11){m=0;y++}state.cal={y,m};render()};
  document.getElementById("mPrev").onclick=()=>go(-1);
  document.getElementById("mNext").onclick=()=>go(1);
  document.getElementById("mToday").onclick=()=>{const t=new Date();state.cal={y:t.getFullYear(),m:t.getMonth()};render()};
  document.querySelectorAll(".legend .lg").forEach(function(l){l.addEventListener("click",function(){const c=this.dataset.cat;state.catOff.has(c)?state.catOff.delete(c):state.catOff.add(c);render()});});
  const cs=document.getElementById("calSeg"); if(cs) cs.onchange=(ev)=>{state.calSeg=ev.target.value;render()};
  document.querySelectorAll(".calendar .bar").forEach(function(b){b.addEventListener("click",function(ev){ev.stopPropagation();abrir(+this.dataset.id)});});
  document.querySelectorAll(".calendar .more").forEach(mm=>mm.onclick=(ev)=>{ev.stopPropagation();dayPopover(mm.dataset.date,ev)});
  document.querySelectorAll(".toplead").forEach(t=>t.onclick=()=>abrir(+t.dataset.id));
}

function dayPopover(dateStr,ev){
  fecharPop();
  const day=new Date(dateStr+"T12:00");
  const evs=state.all.filter(e=>{if(state.catOff.has(e.categoria))return false;return stripTime(e._ini)<=stripTime(day)&&stripTime(e._fim)>=stripTime(day)}).sort((a,b)=>a._ini-b._ini);
  const pop=document.createElement("div"); pop.className="pop"; pop.id="pop";
  pop.innerHTML=`<h5>${day.getDate()} de ${MES_NOME[day.getMonth()]}</h5>`+evs.map(e=>`<div class="pev" data-id="${e.id}"><span class="pd" style="background:${CAT_COLOR[e.categoria]||CAT_COLOR.outros}"></span><span>${esc(e.titulo)}</span></div>`).join("");
  document.body.appendChild(pop);
  const x=Math.min(ev.clientX, window.innerWidth-290), yy=Math.min(ev.clientY, window.innerHeight-360);
  pop.style.left=x+"px"; pop.style.top=yy+"px";
  pop.querySelectorAll(".pev").forEach(p=>p.onclick=()=>{fecharPop();abrir(+p.dataset.id)});
  setTimeout(()=>document.addEventListener("click",fecharPop,{once:true}),0);
}
function fecharPop(){const p=document.getElementById("pop");if(p)p.remove()}

// ---------- drawer ----------
function abrir(id){
  const e=state.all.find(x=>x.id===id); if(!e)return;
  const i=e.inteligencia||{}, c=e.contato||{}, s=score(e), col=scoreColor(s);
  const multi=e._ini.toDateString()!==e._fim.toDateString();
  const dstr=multi?`${e._ini.toLocaleDateString("pt-BR")} até ${e._fim.toLocaleDateString("pt-BR")}`:e._ini.toLocaleDateString("pt-BR");
  const chip=(v,l)=>`<span class="copychip" data-copy="${escAttr(v)}" title="Copiar ${l}"><span class="txt">${esc(v)}</span><span class="ico">${copyIco()}</span></span>`;
  const emails=(c.emails||[]).map(v=>chip(v,"e-mail")).join("");
  const tels=(c.telefones||[]).map(v=>chip(v,"telefone")).join("");
  const was=(c.whatsapp||[]).map(v=>chip(v,"WhatsApp")).join("");
  const temC=emails||tels||was;
  const prods=[...(c.produtoras_inferidas||[]),...(i.empresas_citadas||[])].filter((v,idx,a)=>a.indexOf(v)===idx).map(p=>`<span class="tag">${esc(p)}</span>`).join("");

  document.getElementById("drawer").innerHTML=`
    <div class="dhead"><button class="close" id="dClose" aria-label="Fechar">✕</button>
      <div class="cat">${esc(e.categoria)} ${ehNovo(e)?" · novo":""}</div>
      <h2>${esc(e.titulo)}</h2></div>
    <div class="dbody">
      ${e.categoria==="corporativos"?`<div class="dscore"><div class="big" style="color:${col}">${s}</div>
        <div class="meta"><b>${esc(i.porte_estimado||"—")} · ${esc(i.segmento||"—")}</b>Relevância B2B · público: ${esc(i.publico_alvo||"—")}</div></div>`:""}
      <div class="sec"><h4>Contatos</h4>
        ${temC?`<div class="contactlist">${emails}${tels}${was}</div>${c.fonte==="manual"?'<div class="locked">🔒 resgatado manualmente · protegido</div>':""}`:`<div class="no-contact">Sem contato público coletado.</div>`}
      </div>
      ${i.angulo_comercial?`<div class="sec"><h4>Ângulo comercial</h4><div class="angle">${esc(i.angulo_comercial)}</div></div>`:""}
      <div class="sec"><h4>Informações</h4>
        <div class="row2"><span class="k">Quando</span><span class="v">${dstr}</span></div>
        <div class="row2"><span class="k">Local</span><span class="v">${esc(e.local||"A confirmar")}</span></div>
        ${e.site_oficial?`<div class="row2"><span class="k">Site</span><span class="v"><a href="${escAttr(e.site_oficial)}" target="_blank" rel="noopener">${esc(e.site_oficial.replace(/^https?:\/\//,"").slice(0,42))}…</a></span></div>`:""}
      </div>
      ${prods?`<div class="sec"><h4>Produtora / empresas</h4><div class="tags">${prods}</div></div>`:""}
      ${e.descricao?`<div class="sec"><h4>Descrição</h4><div class="desc">${esc(e.descricao.slice(0,420))}${e.descricao.length>420?"…":""}</div></div>`:""}
      ${e.url_visitrio?`<a class="dlink" href="${escAttr(e.url_visitrio)}" target="_blank" rel="noopener">Ver no Visit Rio →</a>`:""}
    </div>`;
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  document.getElementById("dClose").onclick=fechar;
  document.querySelectorAll("#drawer .copychip").forEach(ch=>ch.onclick=()=>copiar(ch.dataset.copy,ch));
}
function fechar(){document.getElementById("drawer").classList.remove("open");document.getElementById("overlay").classList.remove("open")}

// ---------- copiar ----------
async function copiar(txt,el){
  let ok=false;
  try{ await navigator.clipboard.writeText(txt); ok=true; }
  catch(e){ try{const t=document.createElement("textarea");t.value=txt;t.style.position="fixed";t.style.opacity="0";document.body.appendChild(t);t.select();ok=document.execCommand("copy");document.body.removeChild(t)}catch(_){} }
  if(el){el.classList.add("copied");const txtEl=el.querySelector(".txt");const orig=txtEl.textContent;txtEl.textContent="Copiado";setTimeout(()=>{el.classList.remove("copied");txtEl.textContent=orig},1100)}
  toast((ok?"Copiado: ":"Selecione e copie: ")+txt);
}
let toastT;
function toast(msg){const t=document.getElementById("toast");t.innerHTML='<span class="ck">✓</span>'+esc(msg);t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1800)}

// ---------- CSV ----------
function exportCsv(){
  let rows=filtrados();
  if(state.sel.size) rows=rows.filter(e=>state.sel.has(e.id));
  if(!rows.length){toast("Nada para exportar com os filtros atuais");return}
  const cols=["Título","Segmento","Porte","Score B2B","Início","Fim","Local","Site oficial","E-mails","Telefones","WhatsApp","Produtoras","Público-alvo","Ângulo comercial","Status contato","URL Visit Rio"];
  const cell=v=>{v=(v==null?"":String(v)).replace(/"/g,'""');return `"${v}"`};
  const line=e=>{const c=e.contato||{},i=e.inteligencia||{};return [
    e.titulo,i.segmento,i.porte_estimado,i.relevancia_b2b,e.data_inicio,e.data_fim,e.local,e.site_oficial,
    (c.emails||[]).join("; "),(c.telefones||[]).join("; "),(c.whatsapp||[]).join("; "),
    (c.produtoras_inferidas||[]).join("; "),i.publico_alvo,i.angulo_comercial,c.status,e.url_visitrio
  ].map(cell).join(",")};
  const csv="\uFEFF"+cols.map(cell).join(",")+"\n"+rows.map(line).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`leads-eventos-rio-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();a.remove();
  toast(`${rows.length} lead${rows.length>1?"s":""} exportado${rows.length>1?"s":""} em CSV`);
}

// ---------- controls ----------
function syncControls(){
  document.getElementById("q").value=state.q;
  document.getElementById("fSeg").value=state.seg;
  document.getElementById("fPorte").value=state.porte;
  document.getElementById("fContato").checked=state.soContato;
  const fp=document.getElementById("fPast"); if(fp) fp.checked=state.showPast;
  document.querySelectorAll("#fScore button").forEach(b=>b.classList.toggle("on",+b.dataset.s===state.minScore));
}
function bind(){
  document.getElementById("q").oninput=ev=>{state.q=ev.target.value;render()};
  document.getElementById("fSeg").onchange=ev=>{state.seg=ev.target.value;render()};
  document.getElementById("fPorte").onchange=ev=>{state.porte=ev.target.value;render()};
  document.getElementById("fContato").onchange=ev=>{state.soContato=ev.target.checked;render()};
  document.querySelectorAll("#fScore button").forEach(function(b){b.addEventListener("click",function(){state.minScore=+this.dataset.s;syncControls();render()});});
  document.getElementById("btnCsv").onclick=exportCsv;
  // Botões de navegação: usar addEventListener (não onclick) para
  // garantir que o handler é ligado UMA ÚNICA VEZ e nunca sobrescrito.
  document.querySelectorAll("#nav button").forEach(function(b){
    b.addEventListener("click", function(){
      state.view=this.dataset.v;
      fecharPop();
      render();
    });
  });
  document.getElementById("overlay").onclick=fechar;
  document.addEventListener("keydown",e=>{if(e.key==="Escape")fechar()});
  const fpa=document.getElementById("fPast");
  if(fpa) fpa.onchange=ev=>{state.showPast=ev.target.checked;syncControls();render()};
}

// ---------- util ----------
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function escAttr(s){return esc(s).replace(/"/g,"&quot;")}

carregar();
</script>
